name: Notification CI/CD

on:
  push:
    branches: [main, notification-service]
    # paths: ['notification-service/**']
  pull_request:
    branches: [main]
    # paths: ['notification-service/**']
  workflow_dispatch:

jobs:
  # Job 1: Run unit tests
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: notification-service
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm ci
      - run: npm test -- --forceExit


  # Job 2: SonarCloud code quality and security scan
  sonarcloud:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: SonarSource/sonarqube-scan-action@v5.0.0
        with:
          projectBaseDir: notification-service  # Scan only notification-service folder
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}


  # Job 3: Build Docker image and push to Docker Hub
  build-and-push:
    runs-on: ubuntu-latest
    needs: sonarcloud
    steps:
      - uses: actions/checkout@v3
      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/build-push-action@v4
        with:
          context: notification-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/notification-service:latest
